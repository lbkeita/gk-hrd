"# GK-HRD Configuration" 
"project:" 
"  name: GK-HRD" 
"  version: 0.1.0" 
"  seed: 42" 
"  device: auto" 
"" 
"data:" 
"  raw_dir: data/raw" 
"  processed_dir: data/processed" 
"  graphs_dir: data/graphs" 
"  kb_dir: data/knowledge_base" 
"  max_seq_length: 512" 
"" 
"model:" 
"  rag:" 
"    encoder: dmis-lab/biobert-v1.1" 
"    top_k: 5" 
"    hidden_dim: 768" 
"  gnn:" 
"    encoder: xlm-roberta-base" 
"    gat_heads: 4" 
"    gat_layers: 2" 
"    gat_hidden_dim: 256" 
"    dropout: 0.3" 
"  fusion:" 
"    method: attention_gate" 
"    hidden_dim: 512" 
"    dropout: 0.2" 
"    num_classes: 4" 
"" 
"training:" 
"  batch_size: 8" 
"  learning_rate: 2e-5" 
"  weight_decay: 0.01" 
"  epochs: 30" 
"  warmup_ratio: 0.1" 
"  patience: 5" 
"  gradient_clip: 1.0" 
"  num_workers: 0" 
